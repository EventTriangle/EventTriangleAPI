replicaCount: 1
namespace: event-triangle
image:
  repository: kaminome/sender-service
  tag: latest
  pullPolicy: Always

service:
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: grpc
      port: 81
      targetPort: 81
  type: ClusterIP

env:
  - name: RabbitMqHost
    type: secretKeyRef
    refName: event-rabbitmq-default-user
    key: host

  - name: RabbitMqUsername
    type: secretKeyRef
    refName: event-rabbitmq-default-user
    key: username

  - name: RabbitMqPassword
    type: secretKeyRef
    refName: event-rabbitmq-default-user
    key: password

  - name: DatabaseConnectionString
    type: secretKeyRef
    refName: connection-creds
    key: SenderDatabaseConnectionString
